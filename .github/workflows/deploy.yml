name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}" >> .env
          echo "REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}" >> .env
          echo "REACT_APP_GOOGLE_CALENDAR_ID=${{ secrets.REACT_APP_GOOGLE_CALENDAR_ID }}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger via SSH/rsync
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            ./build/ \
            u512427609@beautybyviktoria.com:domains/beautybyviktoria.com/public_html/

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy booking-notification --project-ref klrndnqbetuxxqgczesa
          npx supabase functions deploy appointment-reminder --project-ref klrndnqbetuxxqgczesa
          npx supabase functions deploy email-blast --project-ref klrndnqbetuxxqgczesa
