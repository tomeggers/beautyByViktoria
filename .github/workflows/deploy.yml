name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}" >> .env
          echo "REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}" >> .env
          echo "REACT_APP_GOOGLE_CALENDAR_ID=${{ secrets.REACT_APP_GOOGLE_CALENDAR_ID }}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          pip install paramiko --quiet
          python3 << 'PYEOF'
          import paramiko, os, sys
          from pathlib import Path

          host = 'beautybyviktoria.com'
          port = 65002
          username = 'u512427609'
          password = os.environ['FTP_PASSWORD']
          remote_base = '/domains/beautybyviktoria.com/public_html'
          local_base = './build'

          ssh = paramiko.SSHClient()
          ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          print(f'Connecting to {host}:{port}...')
          ssh.connect(host, port=port, username=username, password=password)
          print('Connected. Opening SFTP...')

          sftp = ssh.open_sftp()
          print('SFTP session open. Uploading files...')

          def upload_dir(local_dir, remote_dir):
              for item in Path(local_dir).iterdir():
                  remote_item = remote_dir + '/' + item.name
                  if item.is_dir():
                      try:
                          sftp.mkdir(remote_item)
                      except OSError:
                          pass
                      upload_dir(str(item), remote_item)
                  else:
                      print(f'  {item.name}')
                      sftp.put(str(item), remote_item)

          upload_dir(local_base, remote_base)
          sftp.close()
          ssh.close()
          print('Deploy complete!')
          PYEOF

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy booking-notification --project-ref klrndnqbetuxxqgczesa
          npx supabase functions deploy appointment-reminder --project-ref klrndnqbetuxxqgczesa
          npx supabase functions deploy email-blast --project-ref klrndnqbetuxxqgczesa