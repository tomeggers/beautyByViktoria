name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}" >> .env
          echo "REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}" >> .env
          echo "REACT_APP_GOOGLE_CALENDAR_ID=${{ secrets.REACT_APP_GOOGLE_CALENDAR_ID }}" >> .env

      - name: Build
        run: npm run build

      - name: Push build to deploy branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tomeggers/beautyByViktoria.git"
          if git clone --depth 1 --branch deploy "$REPO" /tmp/deploy 2>/dev/null; then
            rm -rf /tmp/deploy/*
          else
            mkdir -p /tmp/deploy && cd /tmp/deploy && git init -b deploy && git remote add origin "$REPO"
          fi
          cp -r build/. /tmp/deploy/
          cd /tmp/deploy
          git add -A
          git diff --cached --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push origin deploy

      - name: Trigger Hostinger deployment
        run: curl -X POST "${{ secrets.HOSTINGER_DEPLOY }}"

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy booking-notification --project-ref klrndnqbetuxxqgczesa
          npx supabase functions deploy appointment-reminder --project-ref klrndnqbetuxxqgczesa
          npx supabase functions deploy email-blast --project-ref klrndnqbetuxxqgczesa
